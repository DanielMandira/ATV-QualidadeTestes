name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium || sudo apt-get install -y chromium-browser

      - name: Install dependencies (Aula20)
        run: python -m pip install --upgrade pip && pip install -r Aula20/requirements.txt

      - name: Run black
        run: black --check .
        working-directory: Aula20

      - name: Run flake8
        run: flake8 .
        working-directory: Aula20

      - name: Run pytest
        run: |
          export CHROME_BIN="$(command -v chromium || command -v chromium-browser || true)"
          pytest
        working-directory: Aula20
